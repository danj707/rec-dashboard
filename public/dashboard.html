<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/public/favicon.ico" type="image/x-icon">
<title>rec.us Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-page: #0a0a0a; --bg-card: #141414; --bg-card-hover: #1a1a1a;
  --bg-surface: #1e1e1e; --bg-modal: #111111;
  --border: #262626; --border-subtle: #1e1e1e;
  --text-primary: #f0f0f0; --text-secondary: #888888; --text-muted: #555555;
  --amber: #f59e0b; --amber-glow: rgba(245,158,11,0.08);
  --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --purple: #8b5cf6;
  --pink: #ec4899; --cyan: #06b6d4;
  --chart-grid: #262626; --chart-text: #888;
  --font-display: 'DM Sans', sans-serif; --font-body: 'Inter', sans-serif;
}
[data-theme="light"] {
  --bg-page: #f3f4f6; --bg-card: #ffffff; --bg-card-hover: #fafafa;
  --bg-surface: #ffffff; --bg-modal: #ffffff;
  --border: #d4d4d4; --border-subtle: #e8e8e8;
  --text-primary: #111111; --text-secondary: #555555; --text-muted: #999999;
  --amber: #d97706; --amber-glow: rgba(217,119,6,0.08);
  --blue: #2563eb; --green: #16a34a; --red: #dc2626; --purple: #7c3aed;
  --pink: #db2777; --cyan: #0891b2;
  --chart-grid: #e5e5e5; --chart-text: #666;
}
[data-theme="light"] .btn { background: #fff; border-color: #d4d4d4; color: #333; }
[data-theme="light"] .btn:hover { background: #f5f5f5; border-color: #bbb; }
[data-theme="light"] .btn-amber { background: #d97706; color: #fff; border-color: #d97706; }
[data-theme="light"] .btn-amber:hover { background: #b45309; }
[data-theme="light"] .btn-quick { background: #fff; border-color: #d4d4d4; color: #666; }
[data-theme="light"] .btn-quick:hover, [data-theme="light"] .btn-quick.active { background: #fffbeb; border-color: #d97706; color: #d97706; }
[data-theme="light"] .date-input { background: #fff; border-color: #d4d4d4; color: #333; }
[data-theme="light"] .dash-header { background: #fff; border-color: #e5e5e5; }
[data-theme="light"] .settings-bar { border-color: #e5e5e5; }
[data-theme="light"] .modal-panel { border-color: #e5e5e5; }
[data-theme="light"] .edit-section-header { background: #f9f9f9; }
[data-theme="light"] .edit-section-header:hover { background: #f0f0f0; }
body { font-family: var(--font-body); background: var(--bg-page); color: var(--text-primary); min-height: 100vh; }

/* Header */
.dash-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px;
  border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 0; z-index: 50; }
.dash-header-left { display: flex; align-items: center; gap: 14px; }
.dash-logo { height: 36px; width: auto; max-width: 180px; border-radius: 6px; object-fit: contain; }
.dash-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; }
.dash-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
.dash-header-center { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dash-header-right { display: flex; align-items: center; gap: 8px; }

/* Buttons */
.btn { font-family: var(--font-body); font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #252525; border-color: #333; }
.btn-amber { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 600; }
.btn-amber:hover { background: #d97706; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-quick { background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
  padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; }
.btn-quick:hover, .btn-quick.active { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.date-input { font-family: var(--font-body); font-size: 13px; padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); outline: none; }
.date-input:focus { border-color: var(--amber); }

/* Section */
.dashboard-section { padding: 0 24px; margin-bottom: 8px; }
.section-header { display: flex; align-items: center; gap: 12px; padding: 20px 0 12px 0; }
.section-icon { font-size: 22px; }
.section-label { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-badge { font-size: 10px; color: var(--text-muted); padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; }

/* Widget Grid */

.kpi-strip { display: flex; gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.kpi-strip-item { flex: 1; background: var(--bg-surface); padding: 14px 18px; text-align: center; min-width: 0; }
.kpi-strip-item:first-child { border-radius: 10px 0 0 10px; }
.kpi-strip-item:last-child { border-radius: 0 10px 10px 0; }
.kpi-strip-value { display: block; font-size: 26px; font-weight: 700; color: var(--text-primary); font-family: var(--font-display); letter-spacing: -0.02em; }
.kpi-strip-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.kpi-strip-note { display: block; font-size: 10px; color: var(--text-muted); margin-top: 2px; }
@media (max-width: 600px) { .kpi-strip { flex-wrap: wrap; } .kpi-strip-item { flex: 1 1 45%; } .kpi-strip-value { font-size: 20px; } }
@media print { .kpi-strip { break-inside: avoid; } }
.widget-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media (max-width: 1100px) { .widget-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 800px) { .widget-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .widget-grid { grid-template-columns: 1fr; } }

/* Widget Cards */
.widget-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
  padding: 20px; position: relative; transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s; }
.widget-card:hover { transform: translateY(-2px); border-color: var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.widget-sm { grid-column: span 1; }
.widget-md { grid-column: span 2; min-height: 300px; }
.widget-lg { grid-column: span 4; min-height: 200px; }
@media (max-width: 500px) { .widget-md, .widget-lg { grid-column: span 1; } }

/* Table widget */
.widget-table { overflow-x: auto; max-height: 320px; overflow-y: auto; }
.widget-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
.widget-table th { text-align: left; padding: 6px 10px; font-size: 10px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-card); }
.widget-table td { padding: 5px 10px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
.widget-table tr:hover td { background: var(--bg-card-hover); }
.widget-table .num { text-align: right; font-variant-numeric: tabular-nums; }

/* Target / Goal */
.metric-with-target { display: flex; align-items: center; gap: 16px; }
.metric-with-target .metric-left { flex: 1; }
.progress-ring { width: 68px; height: 68px; flex-shrink: 0; }
.target-pct { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
.target-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.target-editor { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; padding: 8px 10px;
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; }
.target-editor input { font-family: var(--font-body); font-size: 13px; width: 100px; padding: 4px 8px;
  border: 1px solid var(--border); border-radius: 4px; background: var(--bg-card); color: var(--text-primary); outline: none; }
.target-editor input:focus { border-color: var(--amber); }
.target-editor .te-label { font-size: 11px; color: var(--text-secondary); }
.gear-btn { background: none; border: none; cursor: pointer; font-size: 13px; opacity: 0.3; padding: 2px;
  transition: opacity 0.15s; color: var(--text-secondary); }
.gear-btn:hover { opacity: 0.8; }
.widget-card:hover .gear-btn { opacity: 0.5; }
.widget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.widget-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.02em; }
.widget-icon { font-size: 16px; opacity: 0.7; }

/* Metric */
.metric-value { font-family: var(--font-display); font-size: 36px; font-weight: 700; line-height: 1.1; margin-top: 8px; letter-spacing: -0.02em; }
.metric-green { color: var(--green); }
.metric-red { color: var(--red); }
.chart-container { position: relative; width: 100%; height: calc(100% - 50px); min-height: 220px; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-surface) 25%, #222 50%, var(--bg-surface) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
[data-theme="light"] .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; }
[data-theme="light"] .sections-loading .dashboard-section { opacity: 0.5; }
.skeleton-metric { height: 48px; width: 140px; margin-top: 12px; }
.skeleton-chart { height: 200px; width: 100%; margin-top: 12px; }

/* Loading overlay on date change */
.sections-loading .dashboard-section { opacity: 0.35; pointer-events: none; transition: opacity 0.2s; }
.loading-bar { height: 3px; background: var(--bg-surface); overflow: hidden; }
.loading-bar.active .loading-bar-inner { animation: loadSlide 1.2s ease-in-out infinite; }
.loading-bar-inner { height: 100%; width: 30%; background: var(--amber); border-radius: 2px; }
@keyframes loadSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(430%); } }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
  display: flex; justify-content: flex-end; backdrop-filter: blur(2px); }
.modal-panel { width: 560px; max-width: 92vw; background: var(--bg-modal); border-left: 1px solid var(--border);
  height: 100vh; overflow-y: auto; animation: slideIn 0.2s ease-out; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-modal); z-index: 5; }
.modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; padding: 4px; }
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px;
  justify-content: flex-end; position: sticky; bottom: 0; background: var(--bg-modal); }

/* Modal section blocks */
.edit-section { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.edit-section-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  background: var(--bg-surface); cursor: pointer; user-select: none; }
.edit-section-header:hover { background: #252525; }
.edit-section-title { font-size: 14px; font-weight: 600; flex: 1; }
.edit-section-body { padding: 10px 14px; }
.widget-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border-subtle); margin-bottom: 5px; background: var(--bg-card); }
.widget-list-item:hover { border-color: var(--border); }
.widget-list-icon { font-size: 16px; flex-shrink: 0; }
.widget-list-info { flex: 1; min-width: 0; }
.widget-list-name { font-size: 13px; font-weight: 500; }
.widget-list-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.add-section-btn { display: flex; align-items: center; gap: 10px; padding: 14px; border: 2px dashed var(--border);
  border-radius: 10px; cursor: pointer; width: 100%; background: transparent; color: var(--text-secondary);
  font-size: 13px; font-family: var(--font-body); transition: all 0.15s; }
.add-section-btn:hover { border-color: var(--amber); color: var(--amber); }
.mini-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin: 10px 0 6px; }

/* Template Chooser */
.template-overlay { position: fixed; inset: 0; background: var(--bg-page); z-index: 200;
  display: flex; align-items: center; justify-content: center; }
.template-container { max-width: 900px; width: 90%; text-align: center; }
.template-heading { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.template-sub { color: var(--text-secondary); margin-bottom: 40px; font-size: 15px; }
.template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 700px) { .template-grid { grid-template-columns: 1fr; } }
.template-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 14px;
  padding: 28px 20px; cursor: pointer; transition: all 0.2s; text-align: center; }
.template-card:hover { border-color: var(--amber); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
.template-card-icon { font-size: 36px; margin-bottom: 12px; }
.template-card-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.template-card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

.settings-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 24px;
  font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border-subtle); }
.cache-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
/* Map widget */
.map-container { height: 280px; border-radius: 8px; overflow: hidden; z-index: 1; position: relative; }
.map-container .leaflet-control-attribution { font-size: 9px; }

/* Heatmap widget */
.heatmap-grid { display: grid; gap: 2px; font-size: 10px; }
.heatmap-cell { border-radius: 3px; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: var(--text-muted); transition: all 0.15s; min-height: 24px; }
.heatmap-cell:hover { color: var(--text-primary); transform: scale(1.08); z-index: 2; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.heatmap-label { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.heatmap-col-label { font-size: 9px; color: var(--text-muted); text-align: center; }
@keyframes spin { to { transform: rotate(360deg); } }
@media print {
  body { background: #fff !important; color: #000 !important; }
  .dash-header { position: static !important; border: none !important; }
  .settings-bar, .loading-bar, .section-badge, .btn, .btn-quick, .date-input { display: none !important; }
  .widget-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd !important; }
  .dashboard-section { break-inside: avoid; }
}
.print-header .dash-header-center, .print-header .dash-header-right { display: none !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('token') || '';
const _pathParts = window.location.pathname.replace(/^\//, '').split('/');
const IS_SHARE = _pathParts[0] === 'share';
const SHARE_TOKEN = IS_SHARE ? _pathParts[1] : null;
const ORG_SLUG = IS_SHARE ? '' : _pathParts[0];
const IS_PRINT = params.get('_print') === '1';
const PRINT_SECTIONS = params.get('sections') ? params.get('sections').split(',') : null;
const CHART_COLORS = ['#f59e0b','#3b82f6','#22c55e','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#14b8a6','#f97316'];
const pf = v => parseFloat(v) || 0;

function fmt(val, format) {
  if (val == null || isNaN(val)) return '\u2014';
  if (format === 'currency') return '$' + Number(val).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  if (format === 'currency2') return '$' + Number(val).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (format === 'percent') return Number(val).toFixed(1) + '%';
  return Number(val).toLocaleString('en-US');
}
function fmtTooltip(v, format) { return format==='currency' ? '$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0}) : Number(v).toLocaleString('en-US'); }
function shortDate(iso) { if (!iso) return ''; const d = new Date(iso + 'T12:00:00'); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function getMonthRange(offset = 0) {
  const now = new Date(); const y = now.getFullYear(), m = now.getMonth() + offset;
  const start = new Date(y, m, 1), end = new Date(y, m + 1, 0);
  return { start: start.toISOString().split('T')[0], end: end.toISOString().split('T')[0] };
}

// ═══════════════════════════════════════════════════════
//  SECTION REGISTRY
// ═══════════════════════════════════════════════════════
const SECTIONS = {
  revenue: { id: 'revenue', label: 'Revenue Overview', icon: '\uD83D\uDCB0', color: '#22c55e',
    description: 'Financial summary from GL data',
    defaultWidgets: ['gl-total-revenue','gl-total-refunds','gl-net-revenue','gl-transactions','gl-by-code','gl-by-payment-method'] },
  facility: { id: 'facility', label: 'Facility Rentals', icon: '\uD83C\uDFE2', color: '#f59e0b',
    description: 'Booking counts, revenue, and trends',
    defaultWidgets: ['rental-count','rental-revenue','rental-locations','rental-by-location','rental-daily-trend','rental-day-of-week'] },
  programs: { id: 'programs', label: 'Programs & Enrollment', icon: '\uD83D\uDCDA', color: '#3b82f6',
    description: 'Enrollment, capacity, and program revenue',
    defaultWidgets: ['program-enrollments','program-revenue','program-cancellations','program-fill-rate','program-checkins-total','program-checkin-attendees','program-checkin-frequency','program-top','program-checkins-by-section'] },
  courts: { id: 'courts', label: 'Court Bookings', icon: '\uD83C\uDFBE', color: '#8b5cf6',
    description: 'Court reservations, utilization, and booking mix',
    defaultWidgets: ['court-total','court-instant','court-managed','court-util-pct','court-by-court','court-by-location','court-map'] },
  fasttrack: { id: 'fasttrack', label: 'Fast Track', icon: '\uD83D\uDE80', color: '#f97316',
    description: 'Pre-registration demand and conversion metrics',
    defaultWidgets: ['ft-signups','ft-converted','ft-pending','ft-conv-rate','ft-top-programs'] },
  'users-demographics': { id: 'users-demographics', label: 'Users & Demographics', icon: '\uD83D\uDC65', color: '#06b6d4',
    description: 'User growth, age, gender, and location data',
    defaultWidgets: ['user-total','user-new','user-households','user-residents','user-median-age'] },
  memberships: { id: 'memberships', label: 'Memberships', icon: '\uD83C\uDFAB', color: '#ec4899',
    description: 'Member counts, revenue, and check-ins',
    defaultWidgets: ['mem-active','mem-canceled','mem-revenue','mem-net','mem-type-donut'] },
  products: { id: 'products', label: 'Products', icon: '\uD83D\uDECD\uFE0F', color: '#ef4444',
    description: 'Product and POS sales metrics',
    defaultWidgets: ['prod-gross','prod-net','prod-refunds','prod-units','prod-by-product'] },
  instructors: { id: 'instructors', label: 'Instructor Payout', icon: '\uD83C\uDF93', color: '#22c55e',
    description: 'Instructor revenue splits and performance',
    defaultWidgets: ['instr-net','instr-payout','instr-org-ret','instr-fill','instr-top'] },
  'ai-briefing': { id: 'ai-briefing', label: 'AI Executive Briefing', icon: '\u2728', color: '#a855f7',
    description: 'AI-generated narrative summary from all dashboard data',
    defaultWidgets: [], _special: true },

};

// Map dashboard section IDs to report types on the reporting project
const SECTION_REPORT_MAP = {
  revenue: 'gl',
  facility: 'facility',
  programs: 'programs',
  courts: 'court-utilization',
  fasttrack: 'fasttrack',
  'users-demographics': 'users',
  memberships: 'memberships',
  products: 'products',
  instructors: 'instructor-payout',
};

// Reports that show all-time data regardless of date picker
const ALL_TIME_REPORTS = new Set(['fasttrack', 'memberships', 'users', 'program-demographics', 'retention', 'checkins']);

// ═══════════════════════════════════════════════════════
//  WIDGET REGISTRY
// ═══════════════════════════════════════════════════════

const dataStore = {};
async function fetchReportData(rt, dr) {
  const key = `${rt}:${dr.start}:${dr.end}`;
  if (dataStore[key]) return dataStore[key];
  const qs = new URLSearchParams({ start: dr.start, end: dr.end });
  const url = IS_SHARE
    ? `/share/${SHARE_TOKEN}/data/${rt}?${qs}`
    : `/${ORG_SLUG}/api/data/${rt}?token=${TOKEN}&${qs}`;
  const resp = await fetch(url);
  if (!resp.ok) return [];
  const json = await resp.json();
  dataStore[key] = json.rows || [];
  return dataStore[key];
}
function clearDataStore() { Object.keys(dataStore).forEach(k => delete dataStore[k]); }

//  EVENT TRACKING
// ═══════════════════════════════════════════════════════
const eventQueue = [];
let flushTimer = null;

function track(event, props = {}) {
  eventQueue.push({ event, ...props, clientTs: new Date().toISOString() });
  if (!flushTimer) {
    flushTimer = setTimeout(flushEvents, 2000); // batch every 2s
  }
}

function flushEvents() {
  flushTimer = null;
  if (!eventQueue.length) return;
  const batch = eventQueue.splice(0);
  fetch(`/${ORG_SLUG}/api/events?token=${TOKEN}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(batch)
  }).catch(() => {}); // fire and forget
}

// Flush on page unload
window.addEventListener('beforeunload', flushEvents);

function applyChartTheme(theme) {
  const isDark = theme !== 'light';
  Chart.defaults.color = isDark ? '#888' : '#666';
  Chart.defaults.borderColor = isDark ? '#262626' : '#e5e5e5';
  Chart.defaults.plugins.tooltip.backgroundColor = isDark ? '#1e1e1e' : '#ffffff';
  Chart.defaults.plugins.tooltip.borderColor = isDark ? '#333' : '#ddd';
  Chart.defaults.plugins.tooltip.titleColor = isDark ? '#eee' : '#111';
  Chart.defaults.plugins.tooltip.bodyColor = isDark ? '#ccc' : '#333';
}

Chart.defaults.plugins.tooltip.padding = 10;

function ProgressRing({ pct, size = 68 }) {
  const clamped = Math.min(100, Math.max(0, pct));
  const color = clamped >= 66 ? 'var(--green)' : clamped >= 33 ? 'var(--amber)' : 'var(--red)';
  const r = 15.9155;
  const circ = 2 * Math.PI * r;
  return (
    <svg className="progress-ring" viewBox="0 0 36 36" width={size} height={size}>
      <circle cx="18" cy="18" r={r} fill="none" stroke="var(--border)" strokeWidth="3" />
      <circle cx="18" cy="18" r={r} fill="none" stroke={color} strokeWidth="3"
        strokeDasharray={`${clamped} ${100 - clamped}`} strokeDashoffset="25"
        strokeLinecap="round" style={{transition:'stroke-dasharray 0.5s ease'}} />
      <text x="18" y="19.5" textAnchor="middle" fontSize="8" fontWeight="700"
        fontFamily="DM Sans,sans-serif" fill="var(--text-primary)">{Math.round(clamped)}%</text>
    </svg>
  );
}

function MetricCard({ data, target }) {
  if (!data) return <div className="skeleton skeleton-metric" />;
  const hasTarget = target != null && target > 0;
  const pct = hasTarget ? (data.value / target) * 100 : 0;

  if (hasTarget) {
    return (
      <div className="metric-with-target">
        <div className="metric-left">
          <div className={`metric-value ${data.colorClass || ''}`} style={{fontSize:30}}>{fmt(data.value, data.format)}</div>
          <div className="target-sub">{Math.round(pct)}% of {fmt(target, data.format)} target</div>
          {data.sub && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{data.sub}</div>}
        </div>
        <ProgressRing pct={pct} />
      </div>
    );
  }

  return <div>
    <div className={`metric-value ${data.colorClass || ''}`}>{fmt(data.value, data.format)}</div>
    {data.sub && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{data.sub}</div>}
  </div>;
}

function BarChartWidget({ data, onBarClick }) {
  const ref = useRef(null), chart = useRef(null);
  useEffect(() => {
    if (chart.current) chart.current.destroy();
    if (!ref.current || !data) return;
    const horiz = data.labels.length > 5;
    chart.current = new Chart(ref.current, { type: 'bar',
      data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: CHART_COLORS.slice(0, data.values.length), borderRadius: 4, maxBarThickness: 40 }] },
      options: { indexAxis: horiz?'y':'x', responsive: true, maintainAspectRatio: false,
        onClick: onBarClick ? (evt, elements) => { if (elements.length > 0) { onBarClick(data.labels[elements[0].index]); } } : undefined,
        onHover: onBarClick ? (evt, elements) => { evt.native.target.style.cursor = elements.length > 0 ? 'pointer' : 'default'; } : undefined,
        plugins: { tooltip: { callbacks: { label: ctx => fmtTooltip(ctx.raw, data.format) + (onBarClick ? '  \u2197 View details' : '') } } },
        scales: { x: { grid: { display: !horiz }, ticks: { callback: v => data.format==='currency' ? '$'+(v>=1000?(v/1000).toFixed(0)+'k':v) : v } },
                  y: { grid: { display: horiz }, ticks: horiz ? {} : { callback: v => data.format==='currency' ? '$'+(v>=1000?(v/1000).toFixed(0)+'k':v) : v } } } }
    });
    return () => { if (chart.current) chart.current.destroy(); };
  }, [data, onBarClick]);
  if (!data) return <div className="skeleton skeleton-chart" />;
  return <div className="chart-container"><canvas ref={ref} /></div>;
}

function DonutChartWidget({ data }) {
  const ref = useRef(null), chart = useRef(null);
  useEffect(() => {
    if (chart.current) chart.current.destroy();
    if (!ref.current || !data) return;
    chart.current = new Chart(ref.current, { type: 'doughnut',
      data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: CHART_COLORS.slice(0, data.values.length), borderWidth: 0, spacing: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { display: true, position: 'right', labels: { boxWidth: 10, padding: 8, font: { size: 11 }, color: '#aaa' } },
          tooltip: { callbacks: { label: ctx => `${ctx.label}: ${data.format==='currency' ? fmt(ctx.raw,'currency') : ctx.raw.toLocaleString()}` } } } }
    });
    return () => { if (chart.current) chart.current.destroy(); };
  }, [data]);
  if (!data) return <div className="skeleton skeleton-chart" />;
  return <div className="chart-container"><canvas ref={ref} /></div>;
}

function LineChartWidget({ data }) {
  const ref = useRef(null), chart = useRef(null);
  useEffect(() => {
    if (chart.current) chart.current.destroy();
    if (!ref.current || !data) return;
    chart.current = new Chart(ref.current, { type: 'line',
      data: { labels: data.labels, datasets: [{ data: data.values, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.08)',
        fill: true, tension: 0.3, pointRadius: 3, pointHoverRadius: 6, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { tooltip: { callbacks: { label: ctx => fmtTooltip(ctx.raw, data.format) } } },
        scales: { x: { grid: { display: false }, ticks: { maxTicksLimit: 12, font: { size: 10 } } },
                  y: { ticks: { callback: v => data.format==='currency' ? '$'+(v>=1000?(v/1000).toFixed(0)+'k':v) : v } } } }
    });
    return () => { if (chart.current) chart.current.destroy(); };
  }, [data]);
  if (!data) return <div className="skeleton skeleton-chart" />;
  return <div className="chart-container"><canvas ref={ref} /></div>;
}

function TableWidget({ data, onBarClick }) {
  if (!data) return <div className="skeleton skeleton-chart" />;
  const numCols = new Set();
  if (data.data.length) data.data[0].forEach((v,i) => { if (typeof v==='number'||String(v).startsWith('$')||String(v).endsWith('%')) numCols.add(i); });
  return (
    <div className="widget-table">
      <table>
        <thead><tr>{data.columns.map((c,i) => <th key={i} className={numCols.has(i)?'num':''}>{c}</th>)}</tr></thead>
        <tbody>{data.data.map((row,ri) => <tr key={ri} style={onBarClick?{cursor:'pointer'}:{}} onClick={onBarClick?()=>onBarClick(row[0]):undefined} title={onBarClick?'Click to view details':''}>{row.map((v,ci) => <td key={ci} className={numCols.has(ci)?'num':''}>{v}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}

//  MAP WIDGET (Leaflet)
// ═══════════════════════════════════════════════════════
const geoCache = {};
async function geocode(query) {
  const fullQuery = query.includes(',') ? query : (window._orgGeo ? query + ', ' + window._orgGeo : query);
  if (geoCache[fullQuery]) return geoCache[fullQuery];
  try {
    const resp = await fetch(`/${ORG_SLUG}/api/geocode?token=${TOKEN}&q=${encodeURIComponent(fullQuery)}`);
    const data = await resp.json();
    if (data.lat != null && data.lng != null) { geoCache[fullQuery] = data; return data; }
  } catch(e) { console.warn('[GEO] Error:', fullQuery, e); }
  return null;
}

function MapWidget({ data }) {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!mapRef.current || !data?.points?.length) return;
    if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; }
    setReady(false);

    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const tiles = isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    const map = L.map(mapRef.current, { scrollWheelZoom: false }).setView([39.5, -98.5], 4);
    L.tileLayer(tiles, { attribution: '\u00A9 OSM \u00A9 CARTO', maxZoom: 18 }).addTo(map);
    mapInst.current = map;

    (async () => {
      const bounds = [];
      for (let i = 0; i < Math.min(data.points.length, 20); i++) {
        const pt = data.points[i];
        const geo = await geocode(pt.query);
        if (geo) {
          const radius = Math.max(6, Math.min(30, Math.sqrt(pt.count) * 2.5));
          L.circleMarker([geo.lat, geo.lng], {
            radius, fillColor: '#f59e0b', fillOpacity: 0.7, color: '#f59e0b', weight: 1, opacity: 0.9
          }).bindTooltip('<strong>' + pt.label + '</strong><br>' + pt.count.toLocaleString() + ' ' + (data.unit || 'users')).addTo(map);
          bounds.push([geo.lat, geo.lng]);
        }
        if (i < data.points.length - 1) await new Promise(r => setTimeout(r, 500));
      }
      if (bounds.length > 1) map.fitBounds(bounds, { padding: [30, 30] });
      else if (bounds.length === 1) map.setView(bounds[0], 10);
      setReady(true);
      setTimeout(() => map.invalidateSize(), 100);
    })();

    return () => { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; } };
  }, [data]);

  if (!data) return <div className="skeleton skeleton-chart" />;
  return <div>
    <div ref={mapRef} className="map-container" />
    {!ready && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4,textAlign:'center'}}>Geocoding locations...</div>}
  </div>;
}

function HeatmapWidget({ data }) {
  if (!data?.grid) return <div className="skeleton skeleton-chart" />;
  const { rows, cols, grid, maxVal } = data;
  const colCount = cols.length + 1; // +1 for row labels
  return (
    <div style={{overflowX:'auto'}}>
      <div className="heatmap-grid" style={{gridTemplateColumns:`50px repeat(${cols.length}, 1fr)`}}>
        <div />
        {cols.map((c,i) => <div key={i} className="heatmap-col-label">{c}</div>)}
        {rows.map((row, ri) => (
          <React.Fragment key={ri}>
            <div className="heatmap-label">{row}</div>
            {grid[ri].map((val, ci) => {
              const intensity = maxVal > 0 ? val / maxVal : 0;
              const bg = val === 0 ? 'var(--bg-surface)' : `rgba(245,158,11,${0.1 + intensity * 0.8})`;
              return <div key={ci} className="heatmap-cell" style={{background:bg}}>{val || ''}</div>;
            })}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

const COMP = { metric: MetricCard, bar: BarChartWidget, donut: DonutChartWidget, line: LineChartWidget, table: TableWidget, map: MapWidget, heatmap: HeatmapWidget };

function WidgetCard({ widgetId, reportData, loading, target, onTargetChange, dateRange, reportingBaseUrl }) {
  const def = W[widgetId]; if (!def) return null;
  const Comp = COMP[def.component]; if (!Comp) return null;
  const raw = reportData[def.reportType];
  const data = raw ? def.transform(raw) : null;
  const sizeClass = def.size==='sm'?'widget-sm':def.size==='lg'?'widget-lg':'widget-md';
  const isMetric = def.component === 'metric';
  const [editingTarget, setEditingTarget] = useState(false);
  const [targetInput, setTargetInput] = useState(target || '');

  function saveTarget() {
    const val = parseFloat(targetInput);
    onTargetChange(widgetId, isNaN(val) || val <= 0 ? null : val);
    setEditingTarget(false);
  }
  function clearTarget() { onTargetChange(widgetId, null); setTargetInput(''); setEditingTarget(false); }

  return (
    <div className={`widget-card ${sizeClass}`}>
      <div className="widget-header">
        <div>
          <span className="widget-label">{def.label}</span>
          <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,fontWeight:400}}>
            <span style={{background: ALL_TIME_REPORTS.has(def.reportType) ? '#eff6ff' : '#fffbeb', color: ALL_TIME_REPORTS.has(def.reportType) ? '#2563eb' : '#d97706', padding:'1px 5px',borderRadius:3,fontWeight:600,fontSize:9,marginRight:4}}>{ALL_TIME_REPORTS.has(def.reportType) ? 'All time' : dateRange ? (() => { const f = d => { const p = d.split('-'); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }; return f(dateRange.start) + ' – ' + f(dateRange.end); })() : ''}</span>
            {def.note}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          {isMetric && <button className="gear-btn" onClick={()=>{setEditingTarget(!editingTarget);setTargetInput(target||'');}} title="Set target">{'\u2699'}</button>}
          <span className="widget-icon">{def.icon}</span>
        </div>
      </div>
      {editingTarget && (
        <div className="target-editor">
          <span className="te-label">Target:</span>
          <input type="number" value={targetInput} onChange={e=>setTargetInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')saveTarget();}} placeholder="e.g. 50000" autoFocus />
          <button className="btn btn-sm btn-amber" onClick={saveTarget}>Save</button>
          {target && <button className="btn btn-sm" style={{color:'var(--red)'}} onClick={clearTarget}>Clear</button>}
        </div>
      )}
      {loading && !data ? <div className={isMetric?'skeleton skeleton-metric':'skeleton skeleton-chart'} />
        : isMetric ? <MetricCard data={data} target={target} /> : <Comp data={data} onBarClick={
          (def.component === 'bar' || def.component === 'table') && def.reportType === 'programs' && reportingBaseUrl
            ? (label) => { var u = reportingBaseUrl + '/' + ORG_SLUG + '/programs?token=' + TOKEN + '&tab=revenue&program=' + encodeURIComponent(label); if (dateRange) { u += '&start_date=' + dateRange.start + '&end_date=' + dateRange.end; } window.open(u, '_blank'); }
            : undefined
        } />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  AI EXECUTIVE BRIEFING SECTION
// ═══════════════════════════════════════════════════════
function BriefingSection({ reportData, loading, dateRange, briefingRef }) {
  const [briefing, setBriefing] = useState(null);
  const [briefingLoading, setBriefingLoading] = useState(false);
  const [traceId, setTraceId] = useState(null);
  const [fbSent, setFbSent] = useState(false);
  const [autoGenerated, setAutoGenerated] = useState(false);
  React.useEffect(function() { if (briefingRef) window._briefingRef = briefingRef; }, [briefingRef]);

  function buildFullSummary() {
    const bySec = {};
    Object.entries(W).forEach(([id, def]) => {
      if (def.component === 'table' || def.component === 'map') return;
      const raw = reportData[def.reportType];
      if (!raw) return;
      try {
        const data = def.transform(raw);
        const secLabel = SECTIONS[def.section]?.label || def.section;
        if (!bySec[secLabel]) bySec[secLabel] = [];
        if (def.component === 'metric' && data?.value != null) {
          bySec[secLabel].push(def.label + ': ' + fmt(data.value, data.format));
        } else if (data?.labels && data?.values) {
          const top3 = data.labels.slice(0, 3).map((l, i) => l + ': ' + (data.format === 'currency' ? fmt(data.values[i], 'currency') : data.values[i]));
          bySec[secLabel].push(def.label + ' (top 3): ' + top3.join(', '));
        }
      } catch(e) {}
    });
    return Object.entries(bySec).map(([sec, lines]) => '=== ' + sec + ' ===\n' + lines.join('\n')).join('\n\n');
  }

  async function generateBriefing() {
    setBriefingLoading(true);
    const summary = buildFullSummary();
    if (!summary) { setBriefing('Not enough data loaded yet. Try refreshing.'); setBriefingLoading(false); return; }
    const dr = dateRange ? dateRange.start + ' to ' + dateRange.end : 'current month';
    try {
      const insightUrl = IS_SHARE
        ? '/share/' + SHARE_TOKEN + '/insights/executive-briefing'
        : '/' + ORG_SLUG + '/api/insights/executive-briefing?token=' + TOKEN;
      const resp = await fetch(insightUrl, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ summary, dateRange: dr })
      });
      const json = await resp.json();
      setBriefing(json.insight || 'No briefing generated.');
      if (window._briefingRef) window._briefingRef.current = json.insight || null;
      setTraceId(json.traceId || null);
      setFbSent(false);
    } catch(e) { setBriefing('Failed to generate briefing.'); }
    setBriefingLoading(false);
    track('briefing_generated');
  }

  // Auto-generate when data loads
  useEffect(() => {
    if (!autoGenerated && !loading && Object.keys(reportData).length > 0) {
      setAutoGenerated(true);
      generateBriefing();
    }
  }, [loading, reportData]);

  function sendFeedback(score) {
    if (!traceId || IS_SHARE) return;
    fetch('/' + ORG_SLUG + '/api/insights/executive-briefing/score?token=' + TOKEN, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId, score })
    }).catch(() => {});
    setFbSent(true);
    track('briefing_feedback', { score });
  }

  return (
    <div className="dashboard-section">
      <div className="section-header">
        <span className="section-icon">{'\u2728'}</span>
        <span className="section-label">AI Executive Briefing</span>
        <div className="section-line" />
        <button onClick={generateBriefing} className="btn btn-sm"
          style={{fontSize:11,opacity:briefingLoading?0.5:1}} disabled={briefingLoading}>
          {'\u21BB'} Regenerate
        </button>
      </div>
      <div style={{background:'linear-gradient(135deg, rgba(124,58,237,0.08), rgba(139,92,246,0.04))',
        border:'1px solid rgba(139,92,246,0.2)',borderRadius:12,padding:'20px 24px'}}>
        {briefingLoading ? (
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'4px 0'}}>
            <div style={{width:14,height:14,border:'2px solid var(--purple)',borderTopColor:'transparent',borderRadius:'50%',
              animation:'spin 0.8s linear infinite'}} />
            <span style={{color:'var(--text-muted)',fontSize:13}}>Analyzing dashboard data...</span>
          </div>
        ) : briefing ? (
          <div style={{fontSize:12,lineHeight:1.8,color:'var(--text-primary)',fontFamily:'var(--font-body)',
            letterSpacing:'0.01em'}}
            dangerouslySetInnerHTML={{__html: briefing
              .replace(/\*\*([^*]+)\*\*/g, '<strong style="color:var(--amber);font-family:var(--font-body);font-weight:600">$1</strong>')
              .replace(/\n/g, '<br/>')}} />
        ) : null}
        {!briefingLoading && briefing && traceId && !IS_SHARE && (
          <div style={{marginTop:16,paddingTop:12,borderTop:'1px solid rgba(139,92,246,0.15)',display:'flex',alignItems:'center',gap:10}}>
            {fbSent ? (
              <span style={{fontSize:11,color:'var(--text-muted)',fontStyle:'italic'}}>{'\u2713'} Thanks for the feedback</span>
            ) : (
              <React.Fragment>
                <span style={{fontSize:11,color:'var(--text-muted)'}}>Helpful?</span>
                <button onClick={()=>sendFeedback(1)} title="Helpful"
                  style={{background:'transparent',border:'1px solid var(--border)',borderRadius:6,width:28,height:26,cursor:'pointer',
                    fontSize:13,lineHeight:1,transition:'all 0.15s'}}
                  onMouseOver={e=>{e.currentTarget.style.background='rgba(34,197,94,0.15)';e.currentTarget.style.borderColor='var(--green)';}}
                  onMouseOut={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='var(--border)';}}>
                  {'\uD83D\uDC4D'}</button>
                <button onClick={()=>sendFeedback(0)} title="Not helpful"
                  style={{background:'transparent',border:'1px solid var(--border)',borderRadius:6,width:28,height:26,cursor:'pointer',
                    fontSize:13,lineHeight:1,transition:'all 0.15s'}}
                  onMouseOver={e=>{e.currentTarget.style.background='rgba(239,68,68,0.15)';e.currentTarget.style.borderColor='var(--red)';}}
                  onMouseOut={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='var(--border)';}}>
                  {'\uD83D\uDC4E'}</button>
              </React.Fragment>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  SECTION BLOCK
// ═══════════════════════════════════════════════════════
function SectionBlock({ sectionId, widgetIds, reportData, loading, targets, onTargetChange, dateRange, aiEnabled, reportLinksEnabled, reportingBaseUrl }) {
  const sec = SECTIONS[sectionId]; if (!sec) return null;
  const [insight, setInsight] = useState(null);
  const [insightLoading, setInsightLoading] = useState(false);
  const [insightOpen, setInsightOpen] = useState(false);
  const [traceId, setTraceId] = useState(null);
  const [fbSent, setFbSent] = useState(false);
  const [fbMode, setFbMode] = useState(null); // null | 'comment'
  const [fbComment, setFbComment] = useState('');

  function sendFeedback(score) {
    if (!traceId) return;
    fetch(`/${ORG_SLUG}/api/insights/${sectionId}/score?token=${TOKEN}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId, score, comment: score === 0 ? fbComment : '' })
    }).catch(() => {});
    setFbSent(true); setFbMode(null);
    track('insight_feedback', { section: sectionId, score });
  }

  async function generateInsight() {
    setInsightLoading(true); setInsightOpen(true);
    // Build summary from widget transforms
    const lines = [];
    widgetIds.forEach(id => {
      const def = W[id]; if (!def || def.component === 'table' || def.component === 'map') return;
      const raw = reportData[def.reportType];
      if (!raw) return;
      const data = def.transform(raw);
      if (def.component === 'metric' && data?.value != null) {
        lines.push(`${def.label}: ${fmt(data.value, data.format)}`);
      } else if (data?.labels && data?.values) {
        const top3 = data.labels.slice(0, 3).map((l, i) => `${l}: ${data.format === 'currency' ? fmt(data.values[i], 'currency') : data.values[i]}`);
        lines.push(`${def.label} (top 3): ${top3.join(', ')}`);
      }
    });
    const summary = lines.join('\n');
    const dr = dateRange ? `${dateRange.start} to ${dateRange.end}` : 'current month';
    try {
      const resp = await fetch(`/${ORG_SLUG}/api/insights/${sectionId}?token=${TOKEN}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ summary, dateRange: dr })
      });
      const json = await resp.json();
      setInsight(json.insight || json.error || 'No insights generated.');
      setTraceId(json.traceId || null);
      setFbSent(false); setFbMode(null); setFbComment('');
    } catch (e) { setInsight('Failed to generate insights.'); }
    setInsightLoading(false);
    track('insight_requested', { section: sectionId });
  }

  return (
    <div className="dashboard-section">
      <div className="section-header">
        <span className="section-icon">{sec.icon}</span>
        <span className="section-label">{sec.label}</span>
        <div className="section-line" />
        {aiEnabled && <button onClick={insightOpen ? () => setInsightOpen(false) : generateInsight}
          style={{background:insightOpen?'linear-gradient(135deg,#7c3aed,#6d28d9)':'linear-gradient(135deg,rgba(124,58,237,0.12),rgba(245,158,11,0.08))',
            border:insightOpen?'1px solid #7c3aed':'1px solid rgba(124,58,237,0.3)',borderRadius:8,padding:'5px 14px',cursor:'pointer',
            fontSize:12,fontWeight:600,color:insightOpen?'#fff':'var(--purple)',display:'flex',alignItems:'center',gap:5,

                      fontSize:13,lineHeight:1,transition:'all 0.15s'}}

          {metricIds.length > 0 && <div className="kpi-strip">
            {metricIds.map(id => {
              const def = W[id]; if (!def) return null;

              const data = raw ? def.transform(raw) : null;

        <div className="widget-grid">
          {widgetIds.map(id => <WidgetCard key={id} widgetId={id} reportData={reportData} loading={loading} reportingBaseUrl={reportingBaseUrl}
            target={targets?.[id]} onTargetChange={onTargetChange} dateRange={dateRange} />)}
        </div>
      )}
    </div>
  );
}

//  EDIT MODAL

const MAX_PER_SECTION = 999;
const MAX_TOTAL = 999;

function EditModal({ sections, onSave, onClose, availableReports, toggles }) {
  const [draft, setDraft] = useState(sections.map(s => ({ ...s, widgets: [...s.widgets] })));
  const [expanded, setExpanded] = useState(sections[0]?.id || '');

  const totalWidgets = draft.reduce((s, sec) => s + sec.widgets.length, 0);
  const atLimit = totalWidgets >= MAX_TOTAL;

  function removeSection(idx) { setDraft(d => d.filter((_,i) => i!==idx)); }
  function moveSection(idx, dir) {
    setDraft(d => { const n=[...d]; const j=idx+dir; if(j<0||j>=n.length) return n; [n[idx],n[j]]=[n[j],n[idx]]; return n; });
  }
  function addSection(secId) {
    const sec = SECTIONS[secId]; if (!sec) return;
    setDraft(d => [...d, { id: secId, widgets: [...sec.defaultWidgets] }]);
    setExpanded(secId);
  }
  function toggleWidget(secIdx, widgetId) {
    setDraft(d => { const n = d.map((s,i) => i===secIdx ? { ...s, widgets: s.widgets.includes(widgetId) ? s.widgets.filter(w=>w!==widgetId) : [...s.widgets, widgetId] } : s); return n; });
  }
  function moveWidget(secIdx, wIdx, dir) {
    setDraft(d => d.map((s,i) => { if (i!==secIdx) return s; const w=[...s.widgets]; const j=wIdx+dir; if(j<0||j>=w.length) return s; [w[wIdx],w[j]]=[w[j],w[wIdx]]; return { ...s, widgets: w }; }));
  }

  const activeSectionIds = new Set(draft.map(s => s.id));
  const availableSections = Object.values(SECTIONS).filter(s => {
      if (activeSectionIds.has(s.id)) return false;
      // Hide AI Briefing section unless admin has enabled it
      // ai-briefing is available to all orgs
      // Also hide sections whose report is hidden on the reporting side (from window._reportVisibility)
      if (window._reportVisibility) {
        const rt = SECTION_REPORT_MAP[s.id];
        if (rt) {
          const vis = window._reportVisibility.find(v => v.type === rt);
          if (vis && !vis.visible) return false;
        }
      }
      return true;
    });

  return (
    <div className="modal-overlay" onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
      <div className="modal-panel">
        <div className="modal-header">
          <span className="modal-title">Edit Dashboard</span>
          <button className="modal-close" onClick={onClose}>{'\u2715'}</button>
        </div>
        <div className="modal-body">
          {draft.map((sec, si) => {
            const secDef = SECTIONS[sec.id]; if (!secDef) return null;
            const isOpen = expanded === sec.id;
            const poolWidgets = Object.entries(W).filter(([id,w]) => w.section===sec.id && !sec.widgets.includes(id));
            return (
              <div key={sec.id+si} className="edit-section">
                <div className="edit-section-header" onClick={() => setExpanded(isOpen ? '' : sec.id)}>
                  <span style={{fontSize:18}}>{secDef.icon}</span>
                  <span className="edit-section-title">{secDef.label}</span>
                  <span style={{fontSize:11,color:sec.widgets.length>=MAX_PER_SECTION?'var(--red)':'var(--text-muted)'}}>{sec.widgets.length}{MAX_PER_SECTION < 100 ? '/'+MAX_PER_SECTION : ''}</span>
                  <div style={{display:'flex',gap:3}}>
                    <button className="btn btn-sm" onClick={e=>{e.stopPropagation();moveSection(si,-1);}} disabled={si===0}>{'\u25B2'}</button>
                    <button className="btn btn-sm" onClick={e=>{e.stopPropagation();moveSection(si,1);}} disabled={si===draft.length-1}>{'\u25BC'}</button>
                    <button className="btn btn-sm" style={{color:'#ef4444'}} onClick={e=>{e.stopPropagation();removeSection(si);}}>{'\u2715'}</button>
                  </div>
                </div>
                {isOpen && (
                  <div className="edit-section-body">
                    <div className="mini-label">Active</div>
                    {sec.widgets.map((wId, wi) => {
                      const wd = W[wId]; if (!wd) return null;
                      return (
                        <div key={wId} className="widget-list-item">
                          <span className="widget-list-icon">{wd.icon}</span>
                          <div className="widget-list-info"><div className="widget-list-name">{wd.label}</div><div className="widget-list-desc">{wd.description}</div></div>
                          <div style={{display:'flex',gap:3}}>
                            <button className="btn btn-sm" onClick={()=>moveWidget(si,wi,-1)} disabled={wi===0}>{'\u25B2'}</button>
                            <button className="btn btn-sm" onClick={()=>moveWidget(si,wi,1)} disabled={wi>=sec.widgets.length-1}>{'\u25BC'}</button>
                            <button className="btn btn-sm" style={{color:'#ef4444'}} onClick={()=>toggleWidget(si,wId)}>{'\u2715'}</button>
                          </div>
                        </div>
                      );
                    })}
                    {poolWidgets.length > 0 && <>
                      <div className="mini-label">Available</div>
                      {poolWidgets.map(([id,wd]) => (
                        <div key={id} className="widget-list-item">
                          <span className="widget-list-icon">{wd.icon}</span>
                          <div className="widget-list-info"><div className="widget-list-name">{wd.label}</div><div className="widget-list-desc">{wd.description}</div></div>
                          <button className="btn btn-sm" style={{color: atLimit||sec.widgets.length>=MAX_PER_SECTION?'var(--text-muted)':'var(--green)'}}
                            disabled={atLimit||sec.widgets.length>=MAX_PER_SECTION} onClick={()=>toggleWidget(si,id)}>+</button>
                        </div>
                      ))}
                    </>}
                  </div>
                )}
              </div>
            );
          })}
          {availableSections.length > 0 && <>
            <div className="mini-label" style={{marginTop:16}}>Add a Section</div>
            {availableSections.map(sec => (
              <button key={sec.id} className="add-section-btn" onClick={() => addSection(sec.id)} style={{marginBottom:8}}>
                <span style={{fontSize:20}}>{sec.icon}</span>
                <div style={{textAlign:'left'}}><div style={{fontWeight:600}}>{sec.label}</div><div style={{fontSize:11,opacity:0.6}}>{sec.description}</div></div>
              </button>
            ))}
          </>}
        </div>
        <div className="modal-footer">
          <span style={{fontSize:11,color:atLimit?'var(--red)':'var(--text-muted)',flex:1}}>{totalWidgets} widgets{MAX_TOTAL < 100 ? ' / '+MAX_TOTAL+(atLimit?' (limit reached)':'') : ''}</span>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-amber" onClick={() => onSave(draft)}>Save Layout</button>
        </div>
      </div>
    </div>
  );
}

//  SETTINGS
// ═══════════════════════════════════════════════════════
function SettingsPopover({ cacheTTL, onCacheTTLChange, onClearCache, onReset, theme, onThemeChange, emailDigestEnabled, sections, dateRange, onSendDigest }) {
  const [confirmReset, setConfirmReset] = useState(false);
  const [subEmail, setSubEmail] = useState('');
  const [subFreq, setSubFreq] = useState('weekly');
  const [subStatus, setSubStatus] = useState(null);
  const [sendEmail, setSendEmail] = useState('');
  const [sendStatus, setSendStatus] = useState(null);

  async function handleSendNow() {
    if (!sendEmail || !sendEmail.includes('@')) { setSendStatus('error'); return; }
    setSendStatus('sending');
    try {
      var json = await onSendDigest(sendEmail);
      setSendStatus(json.ok ? 'sent' : 'error');
      if (json.ok) setTimeout(function() { setSendStatus(null); }, 3000);
    } catch(e) { setSendStatus('error'); }
  }
  const [pdfOpen, setPdfOpen] = useState(false);
  const [pdfSections, setPdfSections] = useState(() => (sections || []).map(s => s.id));
  const [shareUrl, setShareUrl] = useState(null);
  const [shareLoading, setShareLoading] = useState(false);
  const [shareCopied, setShareCopied] = useState(false);

  async function handleSubscribe() {
    if (!subEmail || !subEmail.includes('@')) { setSubStatus('error'); return; }
    setSubStatus('saving');
    try {
      const resp = await fetch('/' + ORG_SLUG + '/api/email-subscribe?token=' + TOKEN, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: subEmail, frequency: subFreq })
      });
      const json = await resp.json();
      setSubStatus(json.ok ? 'success' : 'error');
      if (json.ok) track('email_subscribed', { frequency: subFreq });
    } catch(e) { setSubStatus('error'); }
  }

  function handlePdfExport() {
    if (!pdfSections.length) return;
    const qs = new URLSearchParams({ token: TOKEN, start: dateRange.start, end: dateRange.end, _print: '1', sections: pdfSections.join(',') });
    window.open('/' + ORG_SLUG + '?' + qs.toString(), '_blank');
    track('pdf_exported', { sections: pdfSections.length });
  }

  function togglePdfSection(id) {
    setPdfSections(prev => prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]);
  }

  async function handleShare() {
    setShareLoading(true);
    try {
      const resp = await fetch('/' + ORG_SLUG + '/api/share?token=' + TOKEN, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dateRange })
      });
      const json = await resp.json();
      if (json.ok) { setShareUrl(json.url); track('dashboard_shared'); }
    } catch(e) {}
    setShareLoading(false);
  }

  function copyShareUrl() {
    if (!shareUrl) return;
    navigator.clipboard.writeText(shareUrl).then(() => { setShareCopied(true); setTimeout(() => setShareCopied(false), 2000); });
  }

  return (
    <div style={{ position:'absolute',top:'100%',right:0,marginTop:6,background:'var(--bg-modal)',border:'1px solid var(--border)',
      borderRadius:10,padding:16,width:300,zIndex:60,boxShadow:'0 12px 32px rgba(0,0,0,0.5)',maxHeight:'80vh',overflowY:'auto' }} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Dashboard Settings</div>

      <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:6}}>Theme</div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        <button className={`btn btn-sm ${theme==='dark'?'btn-amber':''}`} style={{flex:1}} onClick={()=>onThemeChange('dark')}>Dark</button>
        <button className={`btn btn-sm ${theme==='light'?'btn-amber':''}`} style={{flex:1}} onClick={()=>onThemeChange('light')}>Light</button>
      </div>

      <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:6}}>Cache Duration</div>
      <select value={cacheTTL} onChange={e=>onCacheTTLChange(Number(e.target.value))}
        style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--text-primary)',fontSize:13,marginBottom:12}}>
        <option value={5}>5 minutes</option><option value={15}>15 minutes</option><option value={30}>30 minutes</option><option value={60}>1 hour</option><option value={240}>4 hours</option>
      </select>
      <button className="btn" style={{width:'100%',fontSize:12,marginBottom:10}} onClick={onClearCache}>Clear Cache Now</button>

      <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4,marginBottom:10}}>
        <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
          {'\uD83D\uDCC4'} PDF Export
        </div>
        {!pdfOpen ? (
          <button className="btn" style={{width:'100%',fontSize:12}} onClick={()=>setPdfOpen(true)}>Choose Sections...</button>
        ) : (
          <div>
            <div style={{maxHeight:140,overflowY:'auto',marginBottom:8}}>
              {(sections || []).map(sec => {
                const def = SECTIONS[sec.id];
                if (!def || sec.id === 'ai-briefing') return null;
                return (
                  <label key={sec.id} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--text-secondary)',
                    cursor:'pointer',padding:'3px 0'}}>
                    <input type="checkbox" checked={pdfSections.includes(sec.id)}
                      onChange={()=>togglePdfSection(sec.id)}
                      style={{accentColor:'var(--amber)',width:14,height:14}} />
                    <span>{def.icon} {def.label}</span>
                  </label>
                );
              })}
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-sm" style={{flex:1}} onClick={()=>setPdfOpen(false)}>Cancel</button>
              <button className="btn btn-sm btn-amber" style={{flex:1}} onClick={handlePdfExport}
                disabled={!pdfSections.length}>
                Export {pdfSections.length} section{pdfSections.length !== 1 ? 's' : ''}
              </button>
            </div>
          </div>
        )}
      </div>

      <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4,marginBottom:10}}>
        <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
          {'\uD83D\uDD17'} Share Dashboard
        </div>
        {shareUrl ? (
          <div>
            <div style={{display:'flex',gap:6,marginBottom:6}}>
              <input type="text" readOnly value={shareUrl}
                style={{flex:1,padding:'6px 8px',borderRadius:6,border:'1px solid var(--border)',
                  background:'var(--bg-surface)',color:'var(--text-primary)',fontSize:10,
                  fontFamily:'var(--font-body)',outline:'none',boxSizing:'border-box'}} />
              <button className="btn btn-sm" style={{fontSize:11,whiteSpace:'nowrap'}} onClick={copyShareUrl}>
                {shareCopied ? '\u2713 Copied' : 'Copy'}
              </button>
            </div>
            <div style={{fontSize:10,color:'var(--text-muted)'}}>Read-only, expires in 72 hours. No login required.</div>
          </div>
        ) : (
          <button className="btn" style={{width:'100%',fontSize:12}} onClick={handleShare} disabled={shareLoading}>
            {shareLoading ? 'Generating...' : 'Generate Share Link'}
          </button>
        )}
      </div>

      <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4,marginBottom:10}}>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
            {'\uD83D\uDCE8'} Send Digest Now
          </div>
          {sendStatus === 'sent' ? (
            <div style={{fontSize:11,color:'var(--green)',padding:'4px 0'}}>{'\u2713'} Sent! Check your inbox.</div>
          ) : (
            <React.Fragment>
              <input type="email" value={sendEmail} onChange={function(e){setSendEmail(e.target.value);}}
                placeholder="you@example.com"
                onKeyDown={function(e){if(e.key==='Enter')handleSendNow();}}
                style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--border)',
                  background:'var(--bg-surface)',color:'var(--text-primary)',fontSize:12,marginBottom:6,
                  fontFamily:'var(--font-body)',outline:'none',boxSizing:'border-box'}} />
              <button className="btn" style={{width:'100%',fontSize:12,fontWeight:600,background:'linear-gradient(135deg,#f97316,#ea580c)',color:'#fff',borderColor:'#ea580c'}}
                onClick={handleSendNow} disabled={sendStatus==='sending'}>
                {sendStatus === 'sending' ? 'Sending...' : sendStatus === 'error' ? 'Failed \u2014 try again' : 'Send Now'}
              </button>
            </React.Fragment>
          )}
        </div>

      {emailDigestEnabled && (
        <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4,marginBottom:10}}>
          <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
            {'\uD83D\uDCE7'} Email Summary
          </div>
          {subStatus === 'success' ? (
            <div style={{fontSize:11,color:'var(--green)',padding:'4px 0'}}>{'\u2713'} Subscribed!</div>
          ) : (
            <React.Fragment>
              <input type="email" value={subEmail} onChange={e=>setSubEmail(e.target.value)}
                placeholder="you@example.com"
                onKeyDown={e=>{if(e.key==='Enter')handleSubscribe();}}
                style={{width:'100%',padding:'6px 8px',borderRadius:6,border:'1px solid var(--border)',
                  background:'var(--bg-surface)',color:'var(--text-primary)',fontSize:12,marginBottom:6,
                  fontFamily:'var(--font-body)',outline:'none',boxSizing:'border-box'}} />
              <div style={{display:'flex',gap:6}}>
                <select value={subFreq} onChange={e=>setSubFreq(e.target.value)}
                  style={{flex:1,padding:'6px 8px',borderRadius:6,border:'1px solid var(--border)',
                    background:'var(--bg-surface)',color:'var(--text-primary)',fontSize:11,fontFamily:'var(--font-body)'}}>
                  <option value="daily">Daily</option>
                  <option value="weekly">Weekly</option>
                  <option value="monthly">Monthly</option>
                </select>
                <button className="btn btn-sm" style={{fontSize:11,fontWeight:600,background:'var(--blue)',color:'#fff',borderColor:'var(--blue)'}}
                  onClick={handleSubscribe} disabled={subStatus==='saving'}>
                  {subStatus === 'saving' ? '...' : 'Subscribe'}
                </button>
              </div>
              {subStatus === 'error' && <div style={{fontSize:10,color:'var(--red)',marginTop:4}}>Enter a valid email</div>}
            </React.Fragment>
          )}
        </div>
      )}

      <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:4}}>
        {!confirmReset ? (
          <button className="btn" style={{width:'100%',fontSize:12,color:'var(--red)',borderColor:'rgba(239,68,68,0.3)'}} onClick={()=>setConfirmReset(true)}>Reset Dashboard</button>
        ) : (
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:12,color:'var(--red)',marginBottom:8}}>Clear layout and start over?</div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-sm" style={{flex:1}} onClick={()=>setConfirmReset(false)}>Cancel</button>
              <button className="btn btn-sm" style={{flex:1,background:'var(--red)',color:'#fff',borderColor:'var(--red)'}} onClick={onReset}>Yes, Reset</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
