function DashboardApp() {
  const [config, setConfig] = useState(null);
  const [orgMeta, setOrgMeta] = useState({});
  const [availableReports, setAvailableReports] = useState({});
  const [dateRange, setDateRange] = useState(getMonthRange(0));
  const [datePreset, setDatePreset] = useState('thisMonth');
  const [reportData, setReportData] = useState({});
  const briefingRef = React.useRef(null);

  function buildDigestPayload() {
    const payload = [];
    (config.sections || []).forEach(function(sec) {
      var secWidgets = [];
      var secDef = SECTIONS[sec.id] || {};
      (sec.widgets || secDef.defaultWidgets || []).forEach(function(wid) {
        var def = W[wid];
        if (!def || def.component === 'table' || def.component === 'map') return;
        var raw = reportData[def.reportType];
        if (!raw) return;
        try {
          var data = def.transform(raw);
          if (def.component === 'metric' && data && data.value != null) {
            secWidgets.push({ label: def.label, value: fmt(data.value, data.format), delta: data.delta || null });
          } else if (data && data.labels && data.values) {
            var top = data.labels.slice(0, 3).map(function(l, i) { return l + ': ' + fmt(data.values[i], data.format); }).join(', ');
            secWidgets.push({ label: def.label, value: top });
          }
        } catch(e) {}
      });
      if (secWidgets.length) {
        payload.push({ title: secDef.label || sec.id, icon: secDef.icon || '', widgets: secWidgets });
      }
    });
    return payload;
  }

  async function handleSendDigest(email) {
    var sections = buildDigestPayload();
    var dr = dateRange ? dateRange.start + ' to ' + dateRange.end : 'current month';
    var resp = await fetch('/' + ORG_SLUG + '/api/send-digest?token=' + TOKEN, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        sections: sections,
        dateRange: dr,
        orgName: orgMeta.name || ORG_SLUG,
        briefing: briefingRef.current || null
      })
    });
    return resp.json();
  }
  const [loading, setLoading] = useState(true);
  const [editOpen, setEditOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [theme, setTheme] = useState('light');
  const [targets, setTargets] = useState({});

  function applyTheme(t) {
    setTheme(t);
    document.documentElement.setAttribute('data-theme', t);
    applyChartTheme(t);
    track('theme_changed', { theme: t });
  }

  useEffect(() => {
    (async () => {
      try {
        const configUrl = IS_SHARE
          ? `/share/${SHARE_TOKEN}/config`
          : `/${ORG_SLUG}/api/config?token=${TOKEN}`;
        const resp = await fetch(configUrl);
        const json = await resp.json();
        setAvailableReports(json.availableReports || {});
        setOrgMeta({ name: json.orgName, logoUrl: json.logoUrl, city: json.city, state: json.state, toggles: json.toggles || {}, reportingBaseUrl: json.reportingBaseUrl || '', reportVisibility: json.reportVisibility || null, readOnly: json.readOnly || false, expiresAt: json.expiresAt || null });
        window._orgGeo = json.city && json.state ? `${json.city}, ${json.state}` : '';
        window._reportVisibility = json.reportVisibility || null;
        if (json.dateRange) { setDateRange(json.dateRange); setDatePreset(''); }
        if (json.config?.sections?.length > 0) {
          setConfig(json.config);
          if (!json.dateRange && json.config.datePreset) applyPreset(json.config.datePreset);
          if (json.config.theme) { setTheme(json.config.theme); document.documentElement.setAttribute('data-theme', json.config.theme); applyChartTheme(json.config.theme); }
          if (json.config.targets) setTargets(json.config.targets);
        } else { setConfig('new'); }
      } catch (e) { setConfig('new'); }
    })();
  }, []);

  // Only refetch when sections/widgets change or date range changes, NOT theme/cacheTTL
  const dataKey = config && config !== 'new' ? JSON.stringify(config.sections.map(s=>s.id+':'+s.widgets.join(','))) : '';

  useEffect(() => {
    if (!config || config === 'new') { setLoading(false); return; }
    const allWidgetIds = config.sections.flatMap(s => s.widgets);
    const rts = [...new Set(allWidgetIds.map(id => W[id]?.reportType).filter(Boolean))];
    if (!rts.length) { setLoading(false); return; }
    setLoading(true); clearDataStore();
    Promise.all(rts.map(rt => fetchReportData(rt, dateRange).then(rows => [rt, rows]).catch(() => [rt, []])))
      .then(results => {
        const rd = {}; results.forEach(([rt, rows]) => { rd[rt] = rows; });
        setReportData(rd); setLoading(false); setLastRefresh(new Date());
        track('dashboard_view', { sections: config.sections.length, widgets: allWidgetIds.length, reportTypes: rts, dateRange });
      });
  }, [dataKey, dateRange]);

  function applyPreset(p) {
    setDatePreset(p);
    if (p==='thisMonth') setDateRange(getMonthRange(0));
    else if (p==='lastMonth') setDateRange(getMonthRange(-1));
    else if (p==='last3') { const r=getMonthRange(-2); r.end=getMonthRange(0).end; setDateRange(r); }
    else if (p==='nextMonth') setDateRange(getMonthRange(1));
    else if (p==='ytd') { const now=new Date(); setDateRange({start:`${now.getFullYear()}-01-01`,end:now.toISOString().split('T')[0]}); }
    track('date_preset_changed', { preset: p });
  }

  async function saveConfig(cfg) {
    try { await fetch(`/${ORG_SLUG}/api/config?token=${TOKEN}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg) }); } catch(e) {}
  }

  async function handleSelectTemplate(key, customSections, chosenTheme) {
    let secs;
    if (key === '__custom' && customSections) {
      secs = customSections;
    } else {
      const t = TEMPLATES[key];
      secs = t.sections.map(s=>({...s, widgets:[...s.widgets]}));
    }
    const t = chosenTheme || 'light';
    const cfg = { template: key, sections: secs, cacheTTL: 15, datePreset: 'thisMonth', theme: t };
    setConfig(cfg); setTheme(t); document.documentElement.setAttribute('data-theme', t); await saveConfig(cfg);
    track('template_selected', { template: key, sections: secs.length, theme: t });
  }

  async function handleSaveSections(sections) {
    const oldIds = config.sections.map(s=>s.id);
    const newIds = sections.map(s=>s.id);
    const added = newIds.filter(id => !oldIds.includes(id));
    const removed = oldIds.filter(id => !newIds.includes(id));
    const cfg = { ...config, sections }; setConfig(cfg); setEditOpen(false); await saveConfig(cfg);
    track('layout_saved', { sections: sections.length, widgets: sections.reduce((s,sec)=>s+sec.widgets.length,0), sectionsAdded: added, sectionsRemoved: removed });
  }

  async function handleClearCache() {
    try { await fetch(`/${ORG_SLUG}/api/cache/clear?token=${TOKEN}`, {method:'POST'}); } catch(e) {}
    clearDataStore(); setDateRange({...dateRange}); setSettingsOpen(false);
    track('cache_cleared');
  }

  async function handleReset() {
    try { await fetch(`/${ORG_SLUG}/api/config?token=${TOKEN}`, {method:'DELETE'}); } catch(e) {}
    track('dashboard_reset');
    flushEvents();
    setConfig('new'); setSettingsOpen(false);
  }

  async function handleCacheTTLChange(ttl) { const cfg={...config,cacheTTL:ttl}; setConfig(cfg); await saveConfig(cfg); }
  async function handleThemeChange(t) { applyTheme(t); const cfg={...config,theme:t}; setConfig(cfg); await saveConfig(cfg); }
  async function handleTargetChange(widgetId, value) {
    const newTargets = { ...targets };
    if (value == null) { delete newTargets[widgetId]; } else { newTargets[widgetId] = value; }
    setTargets(newTargets);
    const cfg = { ...config, targets: newTargets }; setConfig(cfg); await saveConfig(cfg);
    track('target_set', { widget: widgetId, value });
  }
  function handleRefresh() { clearDataStore(); setDateRange({...dateRange}); track('refresh_clicked'); }

  // Auto-print in print mode (must be before early returns to maintain hook order)
  useEffect(() => {
    if (IS_PRINT && !loading && lastRefresh) {
      setTimeout(() => window.print(), 500);
    }
  }, [loading, lastRefresh]);

  if (config === 'new') return <TemplateChooser onSelect={handleSelectTemplate} />;
  if (!config) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text-secondary)'}}>Loading...</div>;

  const isReadOnly = orgMeta.readOnly || IS_SHARE;
  const totalWidgets = config.sections.reduce((s,sec) => s + sec.widgets.length, 0);
  const displaySections = (() => {
    const filtered = config.sections.filter(sec => {
      if (sec.id === 'ai-briefing') return false;
      if (PRINT_SECTIONS && !PRINT_SECTIONS.includes(sec.id)) return false;
      if (!orgMeta.reportVisibility) return true;
      const reportType = SECTION_REPORT_MAP[sec.id];
      if (!reportType) return true;
      const vis = orgMeta.reportVisibility.find(v => v.type === reportType);
      if (!vis) return true;
      return vis.visible;
    });
    const userIdx = filtered.findIndex(s => s.id === 'users-demographics');
    if (userIdx > 0) { const [ud] = filtered.splice(userIdx, 1); filtered.unshift(ud); }
    return filtered;
  })();

  return (
    <div>
      {!IS_PRINT && !isReadOnly && (
        <div style={{background:'linear-gradient(135deg,#ea580c,#f97316)',padding:'8px 24px',textAlign:'center',
          fontSize:13,fontWeight:600,color:'#fff',fontFamily:'var(--font-body)',letterSpacing:'0.02em'}}>
          Enhanced Reports in Early Access — Contact <a href="mailto:dan@rec.us" style={{color:'#fff',textDecoration:'underline'}}>dan@rec.us</a> with Feedback or Questions
        </div>
      )}
      {isReadOnly && !IS_PRINT && (
        <div style={{background:'linear-gradient(135deg,#3b82f6,#2563eb)',padding:'8px 24px',textAlign:'center',
          fontSize:12,fontWeight:500,color:'#fff',fontFamily:'var(--font-body)'}}>
          Shared Dashboard {orgMeta.expiresAt ? '\u00B7 View-only link' : ''} — Powered by <span style={{fontWeight:700}}>rec.us</span>
        </div>
      )}
      <div className={`dash-header ${IS_PRINT ? 'print-header' : ''}`}>
        <div className="dash-header-left">
          {orgMeta.logoUrl && <img src={orgMeta.logoUrl} className="dash-logo" alt="" />}
          <div><div className="dash-title">{orgMeta.name || ORG_SLUG}</div><div className="dash-subtitle">Dashboard{isReadOnly ? ' (shared view)' : ''}</div></div>
        </div>
        {!IS_PRINT && (
          <div className="dash-header-center">
            {isReadOnly ? (
              <span style={{fontSize:12,color:'var(--text-muted)'}}>{dateRange.start} to {dateRange.end}</span>
            ) : (
              <React.Fragment>
                <input type="date" className="date-input" value={dateRange.start} onChange={e=>{setDatePreset('');setDateRange(p=>({...p,start:e.target.value}));}} />
                <span style={{color:'var(--text-muted)',fontSize:12}}>to</span>
                <input type="date" className="date-input" value={dateRange.end} onChange={e=>{setDatePreset('');setDateRange(p=>({...p,end:e.target.value}));}} />
                <button className={`btn-quick ${datePreset==='lastMonth'?'active':''}`} onClick={()=>applyPreset('lastMonth')}>Last Mo</button>
                <button className={`btn-quick ${datePreset==='thisMonth'?'active':''}`} onClick={()=>applyPreset('thisMonth')}>This Mo</button>
                <button className={`btn-quick ${datePreset==='nextMonth'?'active':''}`} onClick={()=>applyPreset('nextMonth')}>Next Mo</button>
                <button className={`btn-quick ${datePreset==='last3'?'active':''}`} onClick={()=>applyPreset('last3')}>3 Mo</button>
                <button className={`btn-quick ${datePreset==='ytd'?'active':''}`} onClick={()=>applyPreset('ytd')}>YTD</button>
              </React.Fragment>
            )}
          </div>
        )}
        {!IS_PRINT && !isReadOnly && (
          <div className="dash-header-right">
            <button className="btn" onClick={handleRefresh}>{'\u21BB'} Refresh</button>
            <button className="btn" onClick={()=>{setEditOpen(true);track('edit_opened');}}>{'\u270E'} Edit Dashboard</button>
            <div style={{position:'relative'}}>
              <button className="btn" onClick={()=>setSettingsOpen(!settingsOpen)}>{'\u2699'}</button>
              {settingsOpen && <SettingsPopover cacheTTL={config.cacheTTL||15} onCacheTTLChange={handleCacheTTLChange} onClearCache={handleClearCache} onReset={handleReset} theme={theme} onThemeChange={handleThemeChange} emailDigestEnabled={orgMeta.toggles?.emailDigest === true} sections={config.sections} dateRange={dateRange} onSendDigest={handleSendDigest} />}
            </div>
          </div>
        )}
      </div>
      {!IS_PRINT && (
        <div className="settings-bar">
          <div><span className="cache-dot" style={{background:loading?'var(--amber)':'var(--green)'}} />
            {loading ? 'Loading data...' : lastRefresh ? `Last refreshed ${lastRefresh.toLocaleTimeString()}` : 'Ready'}</div>
          <div>{config.sections.length} sections {'\u00B7'} {totalWidgets} widgets{!isReadOnly ? ` \u00B7 cache ${config.cacheTTL||15}m` : ''}</div>
        </div>
      )}
      <div className={`loading-bar ${loading ? 'active' : ''}`}><div className="loading-bar-inner" /></div>

      <div className={loading && lastRefresh ? 'sections-loading' : ''}>
        {!IS_PRINT && config.sections.some(s => s.id === 'ai-briefing') && (
          <BriefingSection reportData={reportData} loading={loading} dateRange={dateRange} briefingRef={briefingRef} />
        )}
        {displaySections.map((sec, i) => (
          <SectionBlock key={sec.id+i+theme} sectionId={sec.id} widgetIds={sec.widgets} reportData={reportData} loading={loading}
            targets={targets} onTargetChange={handleTargetChange} dateRange={dateRange} aiEnabled={!isReadOnly && orgMeta.toggles?.ai !== false}
            reportLinksEnabled={!isReadOnly && orgMeta.toggles?.reportLinks === true} reportingBaseUrl={orgMeta.reportingBaseUrl || ''} />
        ))}
      </div>

      {!isReadOnly && editOpen && <EditModal sections={config.sections.filter(sec => {
          if (!orgMeta.reportVisibility) return true;
          const rt = SECTION_REPORT_MAP[sec.id];
          if (!rt) return true;
          const vis = orgMeta.reportVisibility.find(v => v.type === rt);
          return !vis || vis.visible;
        })} availableReports={availableReports} toggles={orgMeta.toggles || {}} onSave={handleSaveSections} onClose={()=>setEditOpen(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DashboardApp />);
</script>
</body>
</html>
